services:
  - type: web
    name: inventory-dashboard
    runtime: python
    buildCommand: pip install -r dashboard/requirements.txt && pip install -r requirements.txt
    startCommand: gunicorn dashboard.app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
