<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Error — Inventory Dashboard</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #f8f7f4; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: white; border-radius: 12px; padding: 40px; max-width: 500px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h1 { font-size: 18px; margin-bottom: 12px; color: #dc2626; }
    p { font-size: 14px; color: #6b7280; margin-bottom: 16px; }
    pre { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; font-size: 12px; text-align: left; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Dashboard Error</h1>
    <p>Something went wrong loading the data. Check that your Google Sheet is connected and the demand plan has been run.</p>
    <pre>{{ error }}</pre>
  </div>
</body>
</html>
